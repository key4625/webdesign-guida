<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP Esempio</title>
    <style>
        .quadrato {
            width: 100px;
            height: 100px;
            text-align: center;
            background-color: blue;      
        }
    </style>
</head>
<body>
    <div id="box" class="quadrato"></div>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
    // use a script tag or an external JS file
    document.addEventListener("DOMContentLoaded", (event) => {
        //timeline
        gsap.from("#box", { x: -300});
        gsap.to("#box", { x: 300,  rotation: 360, backgroundColor: "red", repeat:4,duration: 4, yoyo:true });
    });
    </script>
</body>
</html>
