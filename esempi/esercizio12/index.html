<!doctype html>
<html lang="it">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esercizio 12 - sito completo con nav, sidebar e footer incluse in file separati</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Stiamo utilizzando il Web Semantico per migliorare l'accessibilità e la SEO del sito -->
  <header>
    <div class="container">
      <div class="headerbar">
        <div class="logo-desk text-center d-none d-md-block">
          <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="orange" />
            <text x="50%" y="55%" text-anchor="middle" fill="white" font-size="20px" font-family="Arial" font-weight="bold">LOGO</text>
          </svg>
        </div>
      </div>
      <!-- Menu -->
      <nav class="navbar navbar-expand-lg" data-bs-theme="dark">
        <div class="container-fluid">
          <a class="navbar-brand d-md-none" href="#"><svg width="70" height="70" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="orange" />
              <text x="50%" y="55%" text-anchor="middle" fill="white" font-size="20px" font-family="Arial" font-weight="bold">LOGO</text>
            </svg></a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
            <ul class="navbar-nav text-uppercase fs-5">
              <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">Home</a></li>
              <li class="nav-item"><a class="nav-link" href="#">Chi siamo</a></li>
              <li class="nav-item"><a class="nav-link" href="#">Prodotti</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </div>
  </header>
  <div class="container">
    <!-- Slideshow o carosello -->
    <div id="carouselExample" class="carousel slide mt-4">
      <div class="carousel-inner">
          <div class="carousel-item active">
          <img src="https://placehold.co/800x400/purple/white?text=Slide+1" class="d-block w-100" alt="Slide 1">
          </div>
          <div class="carousel-item">
          <img src="https://placehold.co/800x400/red/white?text=Slide+2" class="d-block w-100" alt="Slide 2">
          </div>
          <div class="carousel-item">
          <img src="https://placehold.co/800x400/yellow/black?text=Slide+3" class="d-block w-100" alt="Slide 3">
          </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
  </div>
  <div class="container">
    <div class="row">
      <div class="col-12 col-md-9" id="content">
        <main class="my-4">
          <h1>Benvenuto nella home del sito!</h1>
          <div id="listaArticoli" class="row"></div>
        </main>
      </div>
      <aside class="col-12 col-md-3">
        <div class="sidebar-content my-4">
          <div class="mb-3">
            <img src="https://placehold.co/300x250/orange/white?text=Banner+1" class="img-fluid" alt="Banner promozionale 1">
          </div>
          <div class="mb-3">
            <img src="https://placehold.co/300x250/blue/white?text=Banner+2" class="img-fluid" alt="Banner promozionale 2">
          </div>
          <div class="mb-3">
            <img src="https://placehold.co/300x600/green/white?text=Banner+lungo" class="img-fluid" alt="Banner promozionale lungo">
          </div>
        </div>
      </aside>
    </div>
  </div>
  <footer class="pt-5 pb-2">
    <div class="container">
      <div class="row">
        <div class="col-12 col-md-4">
          
          <svg width="150" height="150" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
              <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="orange" />
              <text x="50%" y="55%" text-anchor="middle" fill="white" font-size="20px" font-family="Arial" font-weight="bold">LOGO</text>
            </svg>
        </div>
        <div class="col-12 col-md-4">
          <h3>DOVE SIAMO</h3>
        <address>
              Via Roma, 123<br>
              00100 Roma (RM)<br>
              Italia
              </address>
        </div>
        <div class="col-12 col-md-4">
          <h3>MENU</h3>
          <ul class="list-unstyled">
            <li><a href="#">Home</a></li>
            <li><a href="#">Chi siamo</a></li>
            <li><a href="#">Prodotti</a></li>
          </ul>
        </div>
      </div>
      <p class="text-center mt-5">Copyright &copy; 2024 - Tutti i diritti riservati</p>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="ins-content.js"></script>
</body>

</html>
