<!doctype html>
<html lang="it">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Area Admin - Esercizio 12</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="../styles.css">
</head>

<body>
  <!-- Stiamo utilizzando il Web Semantico per migliorare l'accessibilità e la SEO del sito -->
    <header-backend></header-backend>
    <div class="container">
        <div class="card mx-auto my-4" style="max-width:600px;">
            <div class="card-body">
                <h1 class="card-title text-center">Login</h1>
                <p class="card-text">Benvenuto nell'area amministrativa del sito. Qui puoi gestire i contenuti, visualizzare le statistiche e configurare le impostazioni del tuo sito web.</p>
                <form id="loginForm" action="#" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="Inserisci la tua email">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Inserisci la tua password">
                    </div>
                    <button type="submit" class="btn btn-primary">Accedi</button>
                </form>
            </div>
        </div>
    </div>
  
    <site-footer></site-footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="../js/api-config.js"></script>
    <script src="../js/components.js"></script>
    <script src="js-admin/auth.js"></script>
</body>

</html>
