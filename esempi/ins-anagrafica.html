<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inserimento Anagrafica</title>
    <style>
        body {
            font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        .contenitore {
            max-width:900px;
            margin: 0 auto;
        }
        .form-group {
            display: flex;
            justify-content: flex-start;
            align-items: baseline;
            flex-wrap: wrap;
            column-gap: 1.5em;
            row-gap: 1em;
            padding: 10px 15px 20px 15px;
            background-color:#ececec;
            margin-bottom: 1em;
            border-radius:5px;
        }
        legend {
            font-weight: 500;
            text-transform: uppercase;
            color: #414141;
        }
        .label-block {
            display:block;
            margin-bottom:5px;
        }
        .label-p {
            margin-bottom: 5px;
            margin-top: 0px;
        }
        .divBottoni {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
        }
        .w-100 {
            width: 100%;
        }
        .btn {
            border-radius: 5px;
            padding: 12px 18px;
        }
        .btn-reset {
            border: none;
            background: transparent;
            color: #b20000;
        }
        .btn.btn-primary {
            background-color: black;
            color: white;
            border: 2px solid transparent;
            transition: all .3s ease-in-out;
        }
        .btn.btn-primary:hover {
            background-color: transparent;
            cursor: pointer;
            color: black;
            border: 2px solid black;
        }
        input, textarea, select {
            border-radius: 5px;
            border: none;
            padding: 8px 8px;
        }
            
    </style>
<!-- 
Nome
Cognome
data di nascita
indirizzo (via, numero, città, prov)
cap
numero di telefono
email 
sesso (m/f)
formazione
professione
piccola biografia
aree di interesse (informatica, arte, sport, cultura, ambiente...)
immagine
pulsante per invio
-->
</head>
<body>
<div class="contenitore">
    <a href="#"><- indietro</a>
    <h1>Nuovo contatto</h1>
    <form action="#" method="GET" enctype="multipart/form-data">
        <fieldset class="form-group">
            <legend>Dati anagrafici</legend>
            <div>
                <label for="txtNome" class="label-block">Nome*</label>
                <input type="text" id="txtNome" name="txtNome" placeholder="Mario" required>
            </div>
            <div>
                <label for="txtCognome" class="label-block">Cognome*</label>
                <input type="text" id="txtCognome" name="txtCognome" placeholder="Rossi" required>
            </div>
            <div>
                <label for="dtNascita" class="label-block">Data di nascita</label>
                <input type="date" id="dtNascita" name="dtNascita">
            </div>
            <div class="w-100">
                <p class="label-p">Seleziona il sesso</p>
                <input type="radio" id="sesso_m" name="sesso" value="M">
                <label for="sesso_m">Maschio</label>
                <input type="radio" id="sesso_f" name="sesso" value="F">
                <label for="sesso_f">Femmina</label>
                <input type="radio" id="sesso_n" name="sesso" value="N">
                <label for="sesso_n">Non dichiarato</label>
            </div>
        </fieldset>
        <fieldset class="form-group">
            <legend>Residenza</legend>
            <div>
                <label for="txtIndirizzo" class="label-block">Indirizzo (via/piazza n°)</label>
                <input type="text" id="txtIndirizzo" name="txtIndirizzo" placeholder="Via dei pini 2">
            </div>
            <div>
                <label for="txtCitta" class="label-block">Città</label>
                <input type="text" id="txtCitta" name="txtCitta" placeholder="Macerata" required>
            </div>
            <div>
                <label for="txtProv" class="label-block">Prov</label>
                <input type="text" id="txtProv" name="txtProv" placeholder="MC" size="2">
            </div>
            <div>
                <label for="numCap" class="label-block">CAP</label>
                <input type="number" id="numCap" name="numCap">
            </div>
        </fieldset>
        <fieldset class="form-group">
            <legend>Contatti</legend>
            <div>
                <label for="numTelefono" class="label-block">Telefono</label>
                <input type="tel" id="numTelefono" name="numTelefono">
            </div>
            <div>
                <label for="txtEmail" class="label-block">Email</label>
                <input type="email" id="txtEmail" name="txtEmail">
            </div>
        </fieldset>
        <fieldset class="form-group">
            <legend>Curriculum</legend>
            <div>
                <label for="formazione" class="label-block">Formazione</label>
                <select id="formazione" name="formazione">
                    <option value="media">Scuola media</option>
                    <option value="superiore">Scuola superiore</option>
                    <option value="universita">Università</option>
                </select>
            </div>
            <div>
                <label for="professione" class="label-block">Professione</label>
                <input list="elencoProfessioni" name="professione" id="professione">
                <datalist id="elencoProfessioni">
                    <option value="Artista">  
                    <option value="Contadino">
                    <option value="Ingegnere">
                    <option value="Architetto">  
                    <option value="Medico">
                    <option value="Operaio">
                </datalist>
            </div>
        </fieldset>
        <fieldset class="form-group">
            <legend>Informazioni personali</legend>
            <div>
                <p class="label-p">Seleziona i tuoi interessi</p>
                <input type="checkbox" id="interesse1" name="interesse1" value="informatica">
                <label for="interesse1">Informatica</label>
                <input type="checkbox" id="interesse2" name="interesse2" value="arte">
                <label for="interesse2">Arte</label>
                <input type="checkbox" id="interesse3" name="interesse3" value="sport">
                <label for="interesse3">Sport</label>
                <input type="checkbox" id="interesse4" name="interesse4" value="ambiente">
                <label for="interesse4">Ambiente</label>
                <input type="checkbox" id="interesse5" name="interesse5" value="moda">
                <label for="interesse5">Moda</label>
            </div>
            <div class="w-100">
                <label for="txtBio" class="label-block">Breve biografia</label>
                <textarea id="txtBio" name="txtBio" class="w-100" rows="4"></textarea>
            </div>
            <div>
                <label for="immagine" class="label-block">Inserisci un'immagine</label>
                <input type="file" id="immagine" name="immagine">
            </div>
        </fieldset>
        <div class="divBottoni">   
            <input type="reset" value="Reset" class="btn-reset">
            <input type="submit" value="Crea contatto" class="btn btn-primary">
            <div></div>
        </div>
    </form>
</div>

</body>
</html>
