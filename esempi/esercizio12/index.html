<!doctype html>
<html lang="it">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esercizio 12 - sito completo con nav, sidebar e footer incluse in file separati</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Stiamo utilizzando il Web Semantico per migliorare l'accessibilità e la SEO del sito -->
  <site-header></site-header>
  <div class="container">
    <!-- Slideshow o carosello -->
    <div id="carouselExample" class="carousel slide mt-4">
      <div class="carousel-inner">
          <div class="carousel-item active">
          <img src="https://placehold.co/800x400/purple/white?text=Slide+1" class="d-block w-100" alt="Slide 1">
          </div>
          <div class="carousel-item">
          <img src="https://placehold.co/800x400/red/white?text=Slide+2" class="d-block w-100" alt="Slide 2">
          </div>
          <div class="carousel-item">
          <img src="https://placehold.co/800x400/yellow/black?text=Slide+3" class="d-block w-100" alt="Slide 3">
          </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>
    </div>
  </div>
  <div class="container">
    <h1 class="mt-4">Benvenuto nella home del sito!</h1>
    <div class="row">
      <div class="col-12 col-md-9" id="content">
        <main class="my-4">
          <div id="listaArticoli" class="row"></div>
        </main>
      </div>
      <site-sidebar class="col-12 col-md-3"></site-sidebar>
    </div>
  </div>
  <site-footer></site-footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="js/api-config.js"></script>
  <script src="js/components.js"></script>
  <script src="js/ins-content.js"></script>
</body>

</html>
